# Perzforge dev infrastructure. Usage: docker compose up -d
services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: perzforge
      POSTGRES_PASSWORD: changeme-db-pass   # keep in sync with .env
      POSTGRES_DB: perzforge
    ports:
      - "127.0.0.1:5432:5432"               # localhost only, never 0.0.0.0
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
      - ./scripts/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U perzforge"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass changeme-redis-pass
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "changeme-redis-pass", "ping"]
      interval: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: perzforge
      MINIO_ROOT_PASSWORD: changeme-minio-pass
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - ./minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      retries: 5
      start_period: 5s

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 perzforge changeme-minio-pass; do sleep 1; done;
      mc mb --ignore-existing local/models;
      mc mb --ignore-existing local/mlflow;
      exit 0;
      "

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.21.3
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: perzforge
      AWS_SECRET_ACCESS_KEY: changeme-minio-pass
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: ["/bin/bash", "-c"]
    command:
      - >-
        pip install --quiet psycopg2-binary boto3
        && mlflow server
        --host 0.0.0.0
        --port 5000
        --backend-store-uri postgresql+psycopg2://perzforge:changeme-db-pass@postgres:5432/mlflow
        --artifacts-destination s3://mlflow/
    ports:
      - "127.0.0.1:5000:5000"

  # Optional dashboard (story F1). API must be reachable from the container.
  #   docker compose --profile web up -d --build web
  web:
    profiles: ["web"]
    build:
      context: ./web
      args:
        API_PROXY_TARGET: http://host.docker.internal:8000
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      API_PROXY_TARGET: http://host.docker.internal:8000
      NEXT_PUBLIC_WS_BASE: ws://127.0.0.1:8000
      NEXT_PUBLIC_MLFLOW_URL: http://127.0.0.1:5000
    extra_hosts:
      - "host.docker.internal:host-gateway"
